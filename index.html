<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>現場黒板アプリ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@600&display=swap');

- { margin:0; padding:0; box-sizing:border-box; }

body {
font-family: ‘Noto Sans JP’, sans-serif;
background: #1a1a1a;
overflow: hidden;
height: 100vh; width: 100vw;
user-select: none;
}

#camera-container {
position: relative;
width: 100vw; height: 100vh;
background: #2a2a2a;
overflow: hidden;
}

#video { width:100%; height:100%; object-fit:cover; display:block; }
#canvas { display:none; }

/* ══════════════════════════════
黒板本体
══════════════════════════════ */
#blackboard {
position: absolute;
width: 340px;
background: #1f6b5e;
border: 2.5px solid #fff;
cursor: grab;
top: 60px; left: 20px;
touch-action: none;
box-shadow: 0 4px 24px rgba(0,0,0,0.7), inset 0 0 30px rgba(0,0,0,0.2);
}

#blackboard.dragging { cursor:grabbing; opacity:.92; }

/* ── 上部2行（工事名・工事場所） ── */
.bb-top { border-bottom: 2px solid #fff; }

.bb-row {
display: flex;
align-items: stretch;
border-bottom: 2px solid #fff;
}
.bb-row:last-child { border-bottom: none; }

.bb-label {
background: rgba(0,0,0,0.15);
color: #fff;
font-size: 11px;
font-weight: 700;
letter-spacing: 1px;
min-width: 68px; max-width: 68px;
display: flex; align-items: center; justify-content: center;
border-right: 2px solid #fff;
text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
padding: 6px 2px;
text-align: center;
line-height: 1.3;
}

.bb-val {
flex: 1;
color: #fff;
font-size: 13px;
font-weight: 500;
padding: 6px 10px;
outline: none;
background: transparent;
cursor: text;
display: flex; align-items: center;
text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
word-break: break-all;
line-height: 1.4;
}

.bb-val[contenteditable=“true”]:empty::before {
content: attr(data-placeholder);
color: rgba(255,255,255,0.35);
font-style: italic;
font-size: 11px;
}

/* ── 中央大エリア ── */
.bb-main {
position: relative;
min-height: 110px;
border-bottom: 2px solid #fff;
display: flex;
align-items: center;
justify-content: center;
}

.bb-main-text {
color: #fff;
font-size: 26px;
font-weight: 700;
text-align: center;
padding: 14px 12px;
outline: none;
background: transparent;
cursor: text;
width: 100%;
text-shadow: 1px 1px 3px rgba(0,0,0,0.35);
line-height: 1.4;
word-break: break-all;
display: flex; align-items: center; justify-content: center;
}

.bb-main-text[contenteditable=“true”]:empty::before {
content: attr(data-placeholder);
color: rgba(255,255,255,0.3);
font-style: italic;
font-size: 14px;
}

/* 右下の日付 */
.bb-date {
position: absolute;
bottom: 8px; right: 10px;
color: #fff;
font-size: 11px;
letter-spacing: 1px;
text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
pointer-events: none;
}

/* ── 下部（施工者） ── */
.bb-bottom { /* bb-rowと同じ構造 */ }

/* 業者名ラジオ選択 */
.bb-company-wrap {
flex: 1;
display: flex;
flex-direction: column;
justify-content: center;
padding: 4px 8px;
gap: 3px;
}

.bb-co-options { display:flex; flex-direction:column; gap:2px; }

.bb-co-opt {
display: flex; align-items: center; gap: 5px;
cursor: pointer;
}

.bb-co-opt input[type=“radio”] {
appearance: none; -webkit-appearance: none;
width: 9px; height: 9px;
border: 1.5px solid rgba(255,255,255,0.75);
border-radius: 50%; flex-shrink: 0;
cursor: pointer; transition: background .15s;
}

.bb-co-opt input[type=“radio”]:checked {
background: #fff; border-color: #fff;
}

.bb-co-opt label {
font-size: 11px; color: #fff; cursor: pointer;
font-weight: 500;
text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
line-height: 1.4;
}

#company-other-input {
display: none;
background: rgba(255,255,255,0.12);
border: 1px solid rgba(255,255,255,0.5);
border-radius: 2px;
color: #fff; font-size: 11px;
font-family: ‘Noto Sans JP’, sans-serif;
padding: 2px 6px; outline: none; width: 100%;
}

#company-other-input::placeholder { color: rgba(255,255,255,0.35); font-style:italic; }
#company-other-input:focus { border-color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.18); }

/* リサイズハンドル */
#resize-handle {
position: absolute; bottom:0; right:0;
width:18px; height:18px;
cursor: se-resize; touch-action:none;
}
#resize-handle::after {
content:’’; position:absolute; bottom:3px; right:3px;
width:10px; height:10px;
border-right:2px solid rgba(255,255,255,0.6);
border-bottom:2px solid rgba(255,255,255,0.6);
}

/* ══════════════════════════════
UI
══════════════════════════════ */
#ui-overlay {
position:absolute; bottom:0; left:0; right:0;
display:flex; flex-direction:column; align-items:center;
padding-bottom:30px; pointer-events:none;
}

#controls { display:flex; gap:20px; align-items:center; pointer-events:all; }

.ctrl-btn {
background: rgba(255,255,255,0.15);
border: 2px solid rgba(255,255,255,0.6);
color: #fff; border-radius:50px;
padding:10px 20px;
font-family:‘Noto Sans JP’,sans-serif;
font-size:13px; font-weight:700;
cursor:pointer; letter-spacing:1px;
backdrop-filter:blur(10px);
transition:all .2s;
-webkit-tap-highlight-color:transparent;
}
.ctrl-btn:active { background:rgba(255,255,255,0.35); transform:scale(.95); }

#shutter-btn {
width:72px; height:72px; border-radius:50%;
background:rgba(255,255,255,0.9); border:4px solid #fff;
box-shadow:0 0 0 4px rgba(255,255,255,0.3);
cursor:pointer; transition:all .15s;
-webkit-tap-highlight-color:transparent; pointer-events:all;
}
#shutter-btn:active { transform:scale(.9); background:rgba(200,200,200,0.9); }

#flip-btn {
position:absolute; top:16px; right:16px;
background:rgba(0,0,0,0.4); border:2px solid rgba(255,255,255,0.6);
color:#fff; width:44px; height:44px; border-radius:50%;
font-size:20px; cursor:pointer;
display:flex; align-items:center; justify-content:center;
backdrop-filter:blur(6px);
-webkit-tap-highlight-color:transparent;
pointer-events:all; z-index:50; transition:all .2s;
}
#flip-btn:active { transform:scale(.9); }

#hint {
position:absolute; top:16px; left:16px;
background:rgba(0,0,0,0.45); color:rgba(255,255,255,0.7);
font-size:11px; padding:6px 12px; border-radius:20px;
letter-spacing:.5px; pointer-events:none; backdrop-filter:blur(6px);
}

/* スタート画面 */
#start-screen {
position:absolute; inset:0;
display:flex; flex-direction:column; align-items:center; justify-content:center;
background:#1a1a1a; color:#fff; gap:20px; z-index:100;
}
#start-screen h1 {
font-family:‘Noto Serif JP’,serif; font-size:22px;
letter-spacing:4px; color:#7ec87a;
}
#start-screen p { font-size:14px; color:rgba(255,255,255,0.6); letter-spacing:1px; }
#start-btn {
background:#2d5a27; border:2px solid #7ec87a; color:#fff;
border-radius:50px; padding:14px 36px;
font-family:‘Noto Sans JP’,sans-serif;
font-size:15px; font-weight:700; cursor:pointer; letter-spacing:2px;
-webkit-tap-highlight-color:transparent;
}
#start-btn:active { background:#3d7a35; }

/* プレビュー */
#preview-overlay {
display:none; position:absolute; inset:0;
background:rgba(0,0,0,0.85); z-index:200;
flex-direction:column; align-items:center; justify-content:center; gap:20px;
}
#preview-overlay.show { display:flex; }
#preview-img {
max-width:92vw; max-height:65vh;
border:3px solid #fff; border-radius:4px;
box-shadow:0 8px 40px rgba(0,0,0,0.8);
}
#preview-btns { display:flex; gap:16px; }
.preview-btn {
background:rgba(255,255,255,0.15); border:2px solid rgba(255,255,255,0.7);
color:#fff; border-radius:50px; padding:12px 28px;
font-family:‘Noto Sans JP’,sans-serif; font-size:14px; font-weight:700;
cursor:pointer; letter-spacing:1px;
-webkit-tap-highlight-color:transparent; transition:all .2s;
}
.preview-btn.primary { background:#2d5a27; border-color:#7ec87a; }
.preview-btn:active { transform:scale(.95); }
</style>

</head>

  </div>
  <!-- ══ /黒板 ══ -->

  <div id="hint">黒板をドラッグして移動</div>
  <button id="flip-btn">🔄</button>

  <div id="ui-overlay">
    <div id="controls">
      <button class="ctrl-btn" id="size-btn">サイズ</button>
      <button id="shutter-btn"></button>
      <button class="ctrl-btn" id="opacity-btn">透明度</button>
    </div>
  </div>

  <div id="start-screen">
    <h1>現場黒板</h1>
    <p>工事写真撮影アプリ</p>
    <button id="start-btn" onclick="startCamera()">カメラを起動する</button>
  </div>

  <div id="preview-overlay">
    <img id="preview-img" alt="撮影プレビュー">
    <div id="preview-btns">
      <button class="preview-btn" onclick="closePreview()">撮り直す</button>
      <button class="preview-btn primary" onclick="savePhoto()">保存する</button>
    </div>
  </div>
</div>

<script>
  // 日付（令和変換）
  const today = new Date();
  const y = today.getFullYear();
  const m = today.getMonth()+1;
  const d = today.getDate();
  const reiwaNen = y - 2018;
  document.getElementById('f-date').textContent = `令和${reiwaNen}年${m}月${d}日`;

  // 業者名
  const radios = document.querySelectorAll('input[name="company"]');
  const otherInput = document.getElementById('company-other-input');
  radios.forEach(r => r.addEventListener('change', () => {
    otherInput.style.display = r.value === 'other' ? 'block' : 'none';
    if(r.value === 'other') otherInput.focus();
  }));

  function getCompanyName() {
    const checked = document.querySelector('input[name="company"]:checked');
    if(!checked) return '';
    return checked.value === 'other' ? (otherInput.value || '') : checked.value;
  }

  // カメラ
  let stream = null, facingMode = 'environment';
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');

  async function startCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video:{ facingMode, width:{ideal:1920}, height:{ideal:1080} }, audio:false
      });
      video.srcObject = stream;
      document.getElementById('start-screen').style.display = 'none';
    } catch(e) {
      alert('カメラへのアクセスが許可されていません。\n設定からカメラの使用を許可してください。');
    }
  }

  document.getElementById('flip-btn').addEventListener('click', async () => {
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    if(stream){ stream.getTracks().forEach(t=>t.stop()); await startCamera(); }
  });

  // サイズ切替
  const sizes = [{w:260,l:'小'},{w:340,l:'中'},{w:440,l:'大'}];
  let sizeIdx = 1;
  document.getElementById('size-btn').addEventListener('click', () => {
    sizeIdx = (sizeIdx+1) % sizes.length;
    bb.style.width = sizes[sizeIdx].w + 'px';
    document.getElementById('size-btn').textContent = 'サイズ：' + sizes[sizeIdx].l;
  });

  // 透明度
  const opacities = [1, 0.85, 0.65, 0.45];
  let opIdx = 0;
  document.getElementById('opacity-btn').addEventListener('click', () => {
    opIdx = (opIdx+1) % opacities.length;
    bb.style.opacity = opacities[opIdx];
    document.getElementById('opacity-btn').textContent =
      opIdx===0 ? '透明度' : `透明度${Math.round(opacities[opIdx]*100)}%`;
  });

  // ── ドラッグ ──
  const bb = document.getElementById('blackboard');
  let dragging=false, startX, startY, origX, origY;

  function isEditable(el) {
    return el.isContentEditable || el.closest('[contenteditable]')
        || el.tagName==='INPUT' || el.tagName==='LABEL' || el.closest('label');
  }

  bb.addEventListener('mousedown', e => {
    if(isEditable(e.target) || e.target.id==='resize-handle') return;
    dragging=true; startX=e.clientX; startY=e.clientY;
    origX=bb.offsetLeft; origY=bb.offsetTop;
    bb.classList.add('dragging'); e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if(dragging) move(e.clientX-startX, e.clientY-startY);
  });
  document.addEventListener('mouseup', () => { dragging=false; bb.classList.remove('dragging'); });

  bb.addEventListener('touchstart', e => {
    if(isEditable(e.target) || e.target.id==='resize-handle') return;
    const t=e.touches[0]; dragging=true;
    startX=t.clientX; startY=t.clientY;
    origX=bb.offsetLeft; origY=bb.offsetTop;
    bb.classList.add('dragging');
  },{passive:true});
  document.addEventListener('touchmove', e => {
    if(!dragging) return;
    move(e.touches[0].clientX-startX, e.touches[0].clientY-startY);
    e.preventDefault();
  },{passive:false});
  document.addEventListener('touchend', () => { dragging=false; bb.classList.remove('dragging'); });

  function move(dx,dy){
    const cont=document.getElementById('camera-container');
    bb.style.left = Math.max(0, Math.min(cont.offsetWidth-bb.offsetWidth,  origX+dx)) + 'px';
    bb.style.top  = Math.max(0, Math.min(cont.offsetHeight-bb.offsetHeight, origY+dy)) + 'px';
  }

  // ── リサイズ ──
  const rh = document.getElementById('resize-handle');
  let resizing=false, rsStartX, rsOrigW;
  rh.addEventListener('mousedown', e => {
    resizing=true; rsStartX=e.clientX; rsOrigW=bb.offsetWidth;
    e.preventDefault(); e.stopPropagation();
  });
  rh.addEventListener('touchstart', e => {
    resizing=true; rsStartX=e.touches[0].clientX; rsOrigW=bb.offsetWidth;
    e.stopPropagation();
  },{passive:true});
  document.addEventListener('mousemove', e => {
    if(resizing) bb.style.width = Math.max(200, rsOrigW+(e.clientX-rsStartX))+'px';
  });
  document.addEventListener('touchmove', e => {
    if(resizing) bb.style.width = Math.max(200, rsOrigW+(e.touches[0].clientX-rsStartX))+'px';
  },{passive:true});
  document.addEventListener('mouseup',  () => { resizing=false; });
  document.addEventListener('touchend', () => { resizing=false; });

  // ── シャッター ──
  let capturedDataUrl = null;

  document.getElementById('shutter-btn').addEventListener('click', () => {
    if(!stream){ alert('先にカメラを起動してください'); return; }
    const cont = document.getElementById('camera-container');
    const W=cont.offsetWidth, H=cont.offsetHeight;
    canvas.width=W; canvas.height=H;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video,0,0,W,H);
    drawBlackboard(ctx);
    capturedDataUrl = canvas.toDataURL('image/jpeg',0.95);
    document.getElementById('preview-img').src = capturedDataUrl;
    document.getElementById('preview-overlay').classList.add('show');
  });

  // ── Canvas 黒板描画 ──
  function drawBlackboard(ctx) {
    const bx = bb.offsetLeft, by = bb.offsetTop;
    const bw = bb.offsetWidth, bh = bb.offsetHeight;
    const opacity = parseFloat(bb.style.opacity||1);

    ctx.save();
    ctx.globalAlpha = opacity;

    // 背景
    ctx.fillStyle = '#1f6b5e';
    ctx.fillRect(bx, by, bw, bh);

    // 外枠
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2.5;
    ctx.strokeRect(bx+1.25, by+1.25, bw-2.5, bh-2.5);

    const border = 2;      // 枠線幅
    const labelW = 68;     // ラベル幅
    const rowH = 32;       // 上部行高さ
    const bottomH = 56;    // 施工者欄高さ
    const mainH = bh - rowH*2 - bottomH; // 中央エリア高さ

    // ── 工事名行 ──
    let ry = by;
    drawRow(ctx, bx, ry, bw, rowH, labelW, '工事名',
      document.getElementById('f-work').textContent, 13, false);

    // ── 工事場所行 ──
    ry += rowH;
    drawRow(ctx, bx, ry, bw, rowH, labelW, '工事場所',
      document.getElementById('f-site').textContent, 13, false);

    // ── 中央大エリア ──
    ry += rowH;
    // 上区切り線
    ctx.strokeStyle='#fff'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(bx,ry); ctx.lineTo(bx+bw,ry); ctx.stroke();
    // メインテキスト（中央）
    const mainText = document.getElementById('f-main').textContent;
    ctx.fillStyle='#fff';
    ctx.font = `700 ${Math.round(bw*0.075)}px "Noto Sans JP",sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(mainText, bx+bw/2, ry+mainH/2);
    // 右下日付
    const dateText = document.getElementById('f-date').textContent;
    ctx.font = `400 11px "Noto Sans JP",sans-serif`;
    ctx.textAlign='right'; ctx.textBaseline='alphabetic';
    ctx.fillText(dateText, bx+bw-10, ry+mainH-10);

    // ── 施工者行 ──
    ry += mainH;
    ctx.strokeStyle='#fff'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(bx,ry); ctx.lineTo(bx+bw,ry); ctx.stroke();
    // ラベル背景
    ctx.fillStyle='rgba(0,0,0,0.15)';
    ctx.fillRect(bx, ry, labelW, bottomH);
    // ラベル区切り線
    ctx.strokeStyle='#fff'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(bx+labelW,ry); ctx.lineTo(bx+labelW,ry+bottomH); ctx.stroke();
    // ラベル文字
    ctx.fillStyle='#fff';
    ctx.font='700 11px "Noto Sans JP",sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('施工者', bx+labelW/2, ry+bottomH/2);
    // 値
    ctx.font='500 12px "Noto Sans JP",sans-serif';
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText(getCompanyName(), bx+labelW+10, ry+bottomH/2);

    ctx.restore();
  }

  // 上部の行描画ヘルパー
  function drawRow(ctx, x, y, w, h, labelW, label, val, valSize, topBorder) {
    if(topBorder){
      ctx.strokeStyle='#fff'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+w,y); ctx.stroke();
    }
    // 下区切り線
    ctx.strokeStyle='#fff'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(x,y+h); ctx.lineTo(x+w,y+h); ctx.stroke();
    // ラベル背景
    ctx.fillStyle='rgba(0,0,0,0.15)';
    ctx.fillRect(x, y, labelW, h);
    // ラベル区切り
    ctx.strokeStyle='#fff'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(x+labelW,y); ctx.lineTo(x+labelW,y+h); ctx.stroke();
    // ラベル文字
    ctx.fillStyle='#fff';
    ctx.font='700 11px "Noto Sans JP",sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(label, x+labelW/2, y+h/2);
    // 値
    ctx.font=`500 ${valSize}px "Noto Sans JP",sans-serif`;
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText(val, x+labelW+10, y+h/2);
  }

  function closePreview(){
    document.getElementById('preview-overlay').classList.remove('show');
    capturedDataUrl=null;
  }

  function savePhoto(){
    if(!capturedDataUrl) return;
    const a=document.createElement('a');
    const ts=new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);
    a.download=`現場写真_${ts}.jpg`;
    a.href=capturedDataUrl; a.click();
    closePreview();
  }
</script>
