<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>現場黒板アプリ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@600&display=swap');

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: ‘Noto Sans JP’, sans-serif;
background: #1a1a1a;
overflow: hidden;
height: 100vh;
width: 100vw;
user-select: none;
}

#camera-container {
position: relative;
width: 100vw;
height: 100vh;
background: #2a2a2a;
overflow: hidden;
}

#video {
width: 100%;
height: 100%;
object-fit: cover;
display: block;
}

#canvas { display: none; }

/* ── 黒板 ── */
#blackboard {
position: absolute;
width: 360px;
display: inline-flex;
flex-direction: column;
background: #2d5a27;
border: 2.5px solid #fff;
border-radius: 3px;
cursor: grab;
top: 60px;
left: 24px;
touch-action: none;
z-index: 10;
box-shadow:
inset 0 0 24px rgba(0,0,0,0.3),
0 4px 20px rgba(0,0,0,0.6),
2px 2px 0 rgba(255,255,255,0.1);
}

#blackboard.dragging {
cursor: grabbing;
opacity: 0.92;
box-shadow: inset 0 0 24px rgba(0,0,0,0.3), 0 12px 40px rgba(0,0,0,0.8);
}

.board-title {
background: rgba(0,0,0,0.25);
text-align: center;
padding: 5px 6px;
border-bottom: 1.5px solid #fff;
font-family: ‘Noto Serif JP’, serif;
font-size: 10px;
font-weight: 600;
color: #fff;
letter-spacing: 2px;
text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
}

.board-fields { padding: 0; flex: 1; display: flex; flex-direction: column; }

.field-row {
display: flex;
border: 0;
border-top: 1.5px solid rgba(255,255,255,0.85);
margin-bottom: 0;
}

/* 作業項目は高さ大きめ */
.field-row.row-work .field-value { min-height: 42px; }

.field-row:last-child { margin-bottom: 0; }

.field-label {
background: rgba(0,0,0,0.2);
color: #fff;
font-size: 8px;
font-weight: 700;
padding: 2px 0;
display: flex;
align-items: center;
justify-content: center;
min-width: 52px;
max-width: 52px;
border-right: 1.5px solid rgba(255,255,255,0.85);
letter-spacing: 0.5px;
line-height: 1.3;
text-align: center;
text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
white-space: pre-line;
}

.field-value {
flex: 1;
color: #fff;
font-size: 10px;
padding: 5px 5px;
display: flex;
align-items: center;
word-break: break-all;
line-height: 1.4;
text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
font-family: ‘Noto Sans JP’, sans-serif;
font-weight: 500;
outline: none;
background: transparent;
cursor: text;
}

.field-value[contenteditable=“true”]:empty::before {
content: attr(data-placeholder);
color: rgba(255,255,255,0.35);
font-style: italic;
font-size: 9px;
}

.field-value.readonly { cursor: default; }

/* 業者名セレクト行 */
.company-wrapper {
flex: 1;
display: flex;
flex-direction: column;
justify-content: center;
padding: 2px 5px;
gap: 2px;
}

/* ラジオボタン風セレクタ */
.company-options {
display: flex;
flex-direction: column;
gap: 2px;
}

.company-option {
display: flex;
align-items: center;
gap: 4px;
cursor: pointer;
}

.company-option input[type=“radio”] {
appearance: none;
-webkit-appearance: none;
width: 8px;
height: 8px;
border: 1.5px solid rgba(255,255,255,0.7);
border-radius: 50%;
flex-shrink: 0;
cursor: pointer;
position: relative;
transition: background .15s;
}

.company-option input[type=“radio”]:checked {
background: #fff;
border-color: #fff;
}

.company-option label {
font-size: 9px;
color: #fff;
cursor: pointer;
font-weight: 500;
text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
max-width: 130px;
line-height: 1.3;
}

/* その他の手入力エリア */
#company-other-input {
display: none;
background: rgba(255,255,255,0.12);
border: 1px solid rgba(255,255,255,0.5);
border-radius: 2px;
color: #fff;
font-size: 9px;
font-family: ‘Noto Sans JP’, sans-serif;
padding: 2px 5px;
outline: none;
width: 100%;
margin-top: 2px;
}

#company-other-input::placeholder {
color: rgba(255,255,255,0.35);
font-style: italic;
}

#company-other-input:focus {
border-color: rgba(255,255,255,0.8);
background: rgba(255,255,255,0.18);
}

/* リサイズハンドル */
#resize-handle {
position: absolute;
bottom: 0; right: 0;
width: 16px; height: 16px;
cursor: se-resize;
touch-action: none;
}

#resize-handle::after {
content: ‘’;
position: absolute;
bottom: 3px; right: 3px;
width: 8px; height: 8px;
border-right: 2px solid rgba(255,255,255,0.6);
border-bottom: 2px solid rgba(255,255,255,0.6);
}

/* UI オーバーレイ */
#ui-overlay {
position: absolute;
bottom: 0; left: 0; right: 0;
display: flex;
flex-direction: column;
align-items: center;
padding-bottom: 30px;
pointer-events: none;
}

#controls {
display: flex;
gap: 20px;
align-items: center;
pointer-events: all;
}

.ctrl-btn {
background: rgba(255,255,255,0.15);
border: 2px solid rgba(255,255,255,0.6);
color: #fff;
border-radius: 50px;
padding: 10px 20px;
font-family: ‘Noto Sans JP’, sans-serif;
font-size: 13px;
font-weight: 700;
cursor: pointer;
letter-spacing: 1px;
backdrop-filter: blur(10px);
transition: all 0.2s;
-webkit-tap-highlight-color: transparent;
}

.ctrl-btn:active { background: rgba(255,255,255,0.35); transform: scale(0.95); }

#shutter-btn {
width: 72px; height: 72px;
border-radius: 50%;
background: rgba(255,255,255,0.9);
border: 4px solid #fff;
box-shadow: 0 0 0 4px rgba(255,255,255,0.3);
cursor: pointer;
transition: all 0.15s;
-webkit-tap-highlight-color: transparent;
pointer-events: all;
}

#shutter-btn:active { transform: scale(0.9); background: rgba(200,200,200,0.9); }

/* カメラ切替 */
#flip-btn {
position: absolute;
top: 16px; right: 16px;
background: rgba(0,0,0,0.4);
border: 2px solid rgba(255,255,255,0.6);
color: #fff;
width: 44px; height: 44px;
border-radius: 50%;
font-size: 20px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
backdrop-filter: blur(6px);
-webkit-tap-highlight-color: transparent;
pointer-events: all;
z-index: 50;
transition: all 0.2s;
}

#flip-btn:active { transform: scale(0.9); }

/* ヒント */
#hint {
position: absolute;
top: 16px; left: 16px;
background: rgba(0,0,0,0.45);
color: rgba(255,255,255,0.7);
font-size: 11px;
padding: 6px 12px;
border-radius: 20px;
letter-spacing: 0.5px;
pointer-events: none;
backdrop-filter: blur(6px);
}

/* スタート画面 */
#start-screen {
position: absolute; inset: 0;
display: flex; flex-direction: column;
align-items: center; justify-content: center;
background: #1a1a1a; color: #fff;
gap: 20px; z-index: 100;
}

#start-screen h1 {
font-family: ‘Noto Serif JP’, serif;
font-size: 22px; letter-spacing: 4px; color: #7ec87a;
}

#start-screen p { font-size: 14px; color: rgba(255,255,255,0.6); letter-spacing: 1px; }

#start-btn {
background: #2d5a27; border: 2px solid #7ec87a; color: #fff;
border-radius: 50px; padding: 14px 36px;
font-family: ‘Noto Sans JP’, sans-serif;
font-size: 15px; font-weight: 700; cursor: pointer; letter-spacing: 2px;
transition: all 0.2s; -webkit-tap-highlight-color: transparent;
}

#start-btn:active { background: #3d7a35; }

/* プレビュー */
#preview-overlay {
display: none; position: absolute; inset: 0;
background: rgba(0,0,0,0.85); z-index: 200;
flex-direction: column; align-items: center; justify-content: center; gap: 20px;
}

#preview-overlay.show { display: flex; }

#preview-img {
max-width: 92vw; max-height: 65vh;
border: 3px solid #fff; border-radius: 4px;
box-shadow: 0 8px 40px rgba(0,0,0,0.8);
}

#preview-btns { display: flex; gap: 16px; }

.preview-btn {
background: rgba(255,255,255,0.15);
border: 2px solid rgba(255,255,255,0.7);
color: #fff; border-radius: 50px;
padding: 12px 28px;
font-family: ‘Noto Sans JP’, sans-serif;
font-size: 14px; font-weight: 700;
cursor: pointer; letter-spacing: 1px;
-webkit-tap-highlight-color: transparent;
transition: all 0.2s;
}

.preview-btn.primary { background: #2d5a27; border-color: #7ec87a; }
.preview-btn:active { transform: scale(0.95); }
</style>

</head>

<button id="flip-btn" title="カメラ切替">🔄</button>

  <div id="ui-overlay">

      <button class="ctrl-btn" id="size-btn">サイズ</button>

  <!-- スタート画面 -->

  <div id="start-screen">
    <h1>現場黒板</h1>
    <p>工事写真撮影アプリ</p>

  </div>

  <!-- プレビュー -->

  <div id="preview-overlay">

    <div id="preview-btns">

<script>
  // 日付
  const today = new Date();
  const y = today.getFullYear();
  const m = String(today.getMonth()+1).padStart(2,'0');
  const d = String(today.getDate()).padStart(2,'0');
  const w = ['日','月','火','水','木','金','土'][today.getDay()];
  document.getElementById('f-date').textContent = `${y}年${m}月${d}日（${w}）`;

  // 業者名セレクト
  const radios = document.querySelectorAll('input[name="company"]');
  const otherInput = document.getElementById('company-other-input');

  radios.forEach(r => {
    r.addEventListener('change', () => {
      if(r.value === 'other') {
        otherInput.style.display = 'block';
        otherInput.focus();
      } else {
        otherInput.style.display = 'none';
      }
    });
  });

  // 現在の業者名を取得
  function getCompanyName() {
    const checked = document.querySelector('input[name="company"]:checked');
    if(!checked) return '';
    if(checked.value === 'other') return otherInput.value || '';
    return checked.value;
  }

  // カメラ
  let stream = null;
  let facingMode = 'environment';
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');

  async function startCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode, width:{ideal:1920}, height:{ideal:1080} },
        audio: false
      });
      video.srcObject = stream;
      document.getElementById('start-screen').style.display = 'none';
    } catch(e) {
      alert('カメラへのアクセスが許可されていません。\n設定からカメラの使用を許可してください。');
    }
  }

  document.getElementById('flip-btn').addEventListener('click', async () => {
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    if(stream) { stream.getTracks().forEach(t => t.stop()); await startCamera(); }
  });

  // サイズ切替
  const sizes = [{w:260,label:'小'},{w:360,label:'中'},{w:460,label:'大'}];
  let sizeIdx = 1;
  document.getElementById('size-btn').addEventListener('click', () => {
    sizeIdx = (sizeIdx+1) % sizes.length;
    document.getElementById('blackboard').style.width = sizes[sizeIdx].w + 'px';
    document.getElementById('size-btn').textContent = 'サイズ：' + sizes[sizeIdx].label;
  });

  // 透明度切替
  const opacities = [1, 0.85, 0.65, 0.45];
  let opIdx = 0;
  document.getElementById('opacity-btn').addEventListener('click', () => {
    opIdx = (opIdx+1) % opacities.length;
    document.getElementById('blackboard').style.opacity = opacities[opIdx];
    document.getElementById('opacity-btn').textContent =
      opIdx === 0 ? '透明度' : `透明度${Math.round(opacities[opIdx]*100)}%`;
  });

  // ── ドラッグ ──
  const bb = document.getElementById('blackboard');
  let dragging = false, startX, startY, origX, origY;

  function isEditable(el) {
    return el.isContentEditable
      || el.closest('[contenteditable]')
      || el.tagName === 'INPUT'
      || el.tagName === 'LABEL'
      || el.closest('label');
  }

  bb.addEventListener('mousedown', e => {
    if(isEditable(e.target) || e.target === document.getElementById('resize-handle')) return;
    dragging = true;
    startX = e.clientX; startY = e.clientY;
    origX = bb.offsetLeft; origY = bb.offsetTop;
    bb.classList.add('dragging'); e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if(!dragging) return;
    move(e.clientX - startX, e.clientY - startY);
  });

  document.addEventListener('mouseup', () => { dragging = false; bb.classList.remove('dragging'); });

  bb.addEventListener('touchstart', e => {
    if(isEditable(e.target) || e.target === document.getElementById('resize-handle')) return;
    const t = e.touches[0];
    dragging = true;
    startX = t.clientX; startY = t.clientY;
    origX = bb.offsetLeft; origY = bb.offsetTop;
    bb.classList.add('dragging');
  }, {passive:true});

  document.addEventListener('touchmove', e => {
    if(!dragging) return;
    const t = e.touches[0];
    move(t.clientX - startX, t.clientY - startY);
    e.preventDefault();
  }, {passive:false});

  document.addEventListener('touchend', () => { dragging = false; bb.classList.remove('dragging'); });

  function move(dx, dy) {
    const cont = document.getElementById('camera-container');
    const maxX = cont.offsetWidth - bb.offsetWidth;
    const maxY = cont.offsetHeight - bb.offsetHeight;
    bb.style.left = Math.max(0, Math.min(maxX, origX + dx)) + 'px';
    bb.style.top  = Math.max(0, Math.min(maxY, origY + dy)) + 'px';
  }

  // ── リサイズ ──
  const rh = document.getElementById('resize-handle');
  let resizing = false, rsStartX, rsOrigW;

  rh.addEventListener('mousedown', e => {
    resizing = true;
    rsStartX = e.clientX; rsOrigW = bb.offsetWidth;
    e.preventDefault(); e.stopPropagation();
  });

  rh.addEventListener('touchstart', e => {
    resizing = true;
    rsStartX = e.touches[0].clientX; rsOrigW = bb.offsetWidth;
    e.stopPropagation();
  }, {passive:true});

  document.addEventListener('mousemove', e => {
    if(!resizing) return;
    bb.style.width = Math.max(160, rsOrigW + (e.clientX - rsStartX)) + 'px';
  });

  document.addEventListener('touchmove', e => {
    if(!resizing) return;
    bb.style.width = Math.max(160, rsOrigW + (e.touches[0].clientX - rsStartX)) + 'px';
  }, {passive:true});

  document.addEventListener('mouseup',  () => { resizing = false; });
  document.addEventListener('touchend', () => { resizing = false; });

  // ── シャッター ──
  let capturedDataUrl = null;

  document.getElementById('shutter-btn').addEventListener('click', () => {
    if(!stream) { alert('先にカメラを起動してください'); return; }
    const cont = document.getElementById('camera-container');
    const W = cont.offsetWidth, H = cont.offsetHeight;
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, W, H);
    drawBlackboard(ctx);
    capturedDataUrl = canvas.toDataURL('image/jpeg', 0.95);
    document.getElementById('preview-img').src = capturedDataUrl;
    document.getElementById('preview-overlay').classList.add('show');
  });

  function drawBlackboard(ctx) {
    const x = bb.offsetLeft, y = bb.offsetTop;
    const w = bb.offsetWidth;
    const opacity = parseFloat(bb.style.opacity || 1);

    const titleH = 22;
    const labelW = 52;
    const bigH = 42;   // 作業項目
    const normH = 26;  // その他の行

    const companyName = getCompanyName();
    const fields = [
      { label:'作業項目',  val: document.getElementById('f-work').textContent, h: bigH },
      { label:'現場名',    val: document.getElementById('f-site').textContent,  h: normH },
      { label:'施工業者名', val: companyName,                                   h: normH },
      { label:'日　付',    val: document.getElementById('f-date').textContent,  h: normH },
    ];

    // 黒板全体の高さをコンテンツから計算
    const totalH = titleH + fields.reduce((s, f) => s + f.h, 0);

    ctx.save();
    ctx.globalAlpha = opacity;

    // 背景（ぴったりサイズ）
    ctx.fillStyle = '#2d5a27';
    ctx.fillRect(x, y, w, totalH);

    // 外枠
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2.5;
    ctx.strokeRect(x + 1.25, y + 1.25, w - 2.5, totalH - 2.5);

    // タイトル行
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(x, y, w, titleH);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(x, y + titleH); ctx.lineTo(x + w, y + titleH); ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = '600 10px "Noto Serif JP", serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('工　事　黒　板', x + w / 2, y + titleH / 2);

    // 各フィールド行
    let fy = y + titleH;
    fields.forEach(f => {
      // 区切り線（上）
      ctx.strokeStyle = 'rgba(255,255,255,0.85)'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(x, fy); ctx.lineTo(x + w, fy); ctx.stroke();

      // ラベル背景
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.fillRect(x, fy, labelW, f.h);

      // ラベル縦区切り
      ctx.strokeStyle = 'rgba(255,255,255,0.85)'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(x + labelW, fy); ctx.lineTo(x + labelW, fy + f.h); ctx.stroke();

      // ラベル文字
      ctx.fillStyle = '#fff';
      ctx.font = '700 9px "Noto Sans JP", sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(f.label, x + labelW / 2, fy + f.h / 2);

      // 値
      ctx.font = '500 10px "Noto Sans JP", sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(f.val, x + labelW + 6, fy + f.h / 2);

      fy += f.h;
    });

    ctx.restore();
  }

  function closePreview() {
    document.getElementById('preview-overlay').classList.remove('show');
    capturedDataUrl = null;
  }

  function savePhoto() {
    if(!capturedDataUrl) return;
    const a = document.createElement('a');
    const ts = new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);
    a.download = `現場写真_${ts}.jpg`;
    a.href = capturedDataUrl;
    a.click();
    closePreview();
  }

  // ── ボタンイベント（全関数定義後にまとめて登録）──
  document.getElementById('start-btn').addEventListener('click', startCamera);
  document.getElementById('retake-btn').addEventListener('click', closePreview);
  document.getElementById('save-btn').addEventListener('click', savePhoto);
</script>

</body>
